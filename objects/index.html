<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Pixel Object Factory</title>
<style>
  :root { --bg:#12141a; --card:#1b1e27; --edge:#2b2f3d; --ink:#e8eaf0; --dim:#9aa0b0; --accent:#ffcf6b; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--ink); font:15px/1.5 system-ui,Segoe UI,Roboto,sans-serif; }
  header { padding:16px; border-bottom:1px solid var(--edge); position:sticky; top:0; background:var(--bg); z-index:5; }
  h1 { margin:0 0 4px; font-size:18px; }
  .meta { color:var(--dim); font-size:13px; }
  .filters { display:flex; flex-wrap:wrap; gap:6px; margin-top:10px; }
  .chip { border:1px solid var(--edge); background:var(--card); color:var(--ink); padding:4px 10px; border-radius:999px; font-size:13px; cursor:pointer; }
  .chip.active { border-color:var(--accent); color:var(--accent); }
  main { padding:14px; display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:14px; }
  .card { background:var(--card); border:1px solid var(--edge); border-radius:12px; padding:10px; }
  .thumb { width:100%; aspect-ratio:1; display:flex; align-items:center; justify-content:center;
           background:linear-gradient(45deg,#0d0f14 25%,transparent 25%),linear-gradient(-45deg,#0d0f14 25%,transparent 25%),
           linear-gradient(45deg,transparent 75%,#0d0f14 75%),linear-gradient(-45deg,transparent 75%,#0d0f14 75%);
           background-size:16px 16px; background-position:0 0,0 8px,8px -8px,-8px 0; border-radius:8px; overflow:hidden; }
  .thumb img { width:100%; height:100%; object-fit:contain; image-rendering:pixelated; }
  .name { font-weight:600; margin-top:8px; }
  .sub { color:var(--dim); font-size:12px; }
  .tags { margin-top:6px; display:flex; flex-wrap:wrap; gap:4px; }
  .tag { font-size:11px; color:var(--accent); border:1px solid var(--edge); border-radius:6px; padding:1px 6px; }
  .badge { font-size:11px; color:var(--dim); }
  dialog { border:1px solid var(--edge); background:var(--card); color:var(--ink); border-radius:14px; max-width:92vw; width:520px; }
  dialog::backdrop { background:rgba(0,0,0,.6); }
  .row { display:flex; flex-wrap:wrap; gap:12px; align-items:flex-start; }
  .cell { text-align:center; }
  .cell img { width:96px; height:96px; object-fit:contain; image-rendering:pixelated; background:#0d0f14; border-radius:8px; }
  .cell .sub { margin-top:2px; }
  h3 { margin:14px 0 6px; font-size:14px; color:var(--dim); text-transform:uppercase; letter-spacing:.04em; }
  .close { float:right; cursor:pointer; color:var(--dim); border:none; background:none; font-size:20px; }
</style>
</head>
<body>
<header>
  <h1>🧰 Pixel Object Factory</h1>
  <div class="meta" id="meta">loading…</div>
  <div class="filters" id="filters"></div>
</header>
<main id="grid"></main>

<dialog id="detail"><button class="close" onclick="detail.close()">×</button><div id="detail-body"></div></dialog>

<script>
let DATA = null, activeCat = "all";

function el(tag, cls, html) { const e = document.createElement(tag); if (cls) e.className = cls; if (html != null) e.innerHTML = html; return e; }

function openDetail(o) {
  const b = document.getElementById("detail-body");
  b.innerHTML = "";
  b.appendChild(el("div", "name", o.name + ' <span class="badge">· ' + o.category + '</span>'));
  b.appendChild(el("div", "sub", o.description || ""));
  b.appendChild(el("div", "sub", (o.size ? o.size.join("×") + "px · " : "") + (o.view || "") + " · " + (o.status || "")));

  b.appendChild(el("h3", null, "Sprite"));
  const srow = el("div", "row");
  srow.appendChild(cell(o.sprite, "base"));
  const rf = o.rotation_files || {};
  Object.keys(rf).forEach(d => { if (d !== o.view) srow.appendChild(cell(rf[d], d)); });
  b.appendChild(srow);

  if (o.animations && o.animations.length) {
    b.appendChild(el("h3", null, "Animations"));
    const arow = el("div", "row");
    o.animations.forEach(a => arow.appendChild(cell(a.gif, a.key + " (" + (a.frames||"?") + "f)")));
    b.appendChild(arow);
  }
  document.getElementById("detail").showModal();
}

function cell(src, label) {
  const c = el("div", "cell");
  const img = el("img"); img.src = src; img.loading = "lazy"; c.appendChild(img);
  c.appendChild(el("div", "sub", label)); return c;
}

function render() {
  const grid = document.getElementById("grid"); grid.innerHTML = "";
  DATA.objects.filter(o => activeCat === "all" || o.category === activeCat).forEach(o => {
    const card = el("div", "card");
    const thumb = el("div", "thumb");
    const img = el("img"); img.src = (o.animations[0] && o.animations[0].gif) || o.sprite; img.loading = "lazy";
    thumb.appendChild(img); card.appendChild(thumb);
    card.appendChild(el("div", "name", o.name));
    card.appendChild(el("div", "sub", o.category));
    const tags = el("div", "tags");
    if (o.rotation_files && Object.keys(o.rotation_files).length) tags.appendChild(el("span", "tag", Object.keys(o.rotation_files).length + "‑dir"));
    o.animations.forEach(a => tags.appendChild(el("span", "tag", "▶ " + a.key)));
    card.appendChild(tags);
    card.onclick = () => openDetail(o);
    grid.appendChild(card);
  });
}

function renderFilters() {
  const f = document.getElementById("filters"); f.innerHTML = "";
  const cats = ["all", ...Object.keys(DATA.categories).sort()];
  cats.forEach(c => {
    const chip = el("span", "chip" + (c === activeCat ? " active" : ""), c + (c === "all" ? " (" + DATA.object_count + ")" : " (" + DATA.categories[c] + ")"));
    chip.onclick = () => { activeCat = c; renderFilters(); render(); };
    f.appendChild(chip);
  });
}

fetch("viewer_data.json").then(r => r.json()).then(d => {
  DATA = d;
  document.getElementById("meta").textContent =
    d.object_count + " / " + d.target_count + " objects · tap one for sprite, rotations & animations";
  renderFilters(); render();
}).catch(e => { document.getElementById("meta").textContent = "could not load viewer_data.json — run the loop first."; });
</script>
</body>
</html>
