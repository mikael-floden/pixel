<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- viewport-fit=cover: draw under notches/rounded corners in the installed
         app; user-scalable=no: pinch-zoom fights the game's own input. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <meta name="theme-color" content="#12121c" />
    <title>Nangijala</title>
    <!-- PWA: installable on the Android home screen; starts fullscreen. -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <style>
      /* touch-action pan-x pan-y: panning (list scrolling) stays allowed but
         PINCH-ZOOM and double-tap-zoom are blocked — crucially this works
         even under "Desktop site", where the viewport meta (incl.
         user-scalable=no) is ignored. main.ts adds the JS belt-and-braces. */
      html, body { margin: 0; height: 100%; background: #12121c; overflow: hidden;
        overscroll-behavior: none; touch-action: pan-x pan-y; }
      /* dvh tracks the REAL visible height on mobile (address bar shown/hidden);
         vh is the fallback for older browsers. touch-action here (NOT on body:
         the select screen's lists still need touch scrolling) stops double-tap
         zoom / pan gestures from fighting the game's tap-to-move. */
      #game { width: 100vw; height: 100vh; height: 100dvh; touch-action: none; }
      canvas { display: block; image-rendering: pixelated; }
      /* Portrait-only on phones (for now): landscape on a small touch screen
         gets a full-screen "rotate back" prompt instead of a broken layout.
         Desktops/laptops (fine pointer) and tall tablets are unaffected. */
      #ml-rotate { display: none; }
      @media (orientation: landscape) and (pointer: coarse) and (max-height: 520px) {
        #ml-rotate { display: flex; position: fixed; inset: 0; z-index: 1000;
          align-items: center; justify-content: center; text-align: center;
          background: #000; color: #e8e8f0; font: 600 20px system-ui, sans-serif; }
        #ml-rotate small { display: block; margin-top: 8px; font: 400 13px system-ui, sans-serif; color: #9aa0bf; }
      }
    </style>
  </head>
  <body>
    <div id="game"></div>
    <div id="ml-rotate"><div>📱<br />Rotate your phone<small>Nangijala plays upright (portrait) for now</small></div></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
