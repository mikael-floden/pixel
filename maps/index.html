<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5">
<title>Pixel Maps — zone viewer</title>
<style>
  :root { --bg:#12151b; --panel:#1b2029; --ink:#e8ecf3; --dim:#95a0b3; --accent:#7fd1a3; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--ink);
         font:15px/1.5 system-ui,-apple-system,Segoe UI,Roboto,sans-serif; }
  header { padding:16px; border-bottom:1px solid #262c38; position:sticky; top:0;
           background:var(--bg); z-index:2; }
  h1 { margin:0; font-size:18px; }
  .sub { color:var(--dim); font-size:13px; margin-top:4px; }
  .wrap { padding:14px; max-width:1100px; margin:0 auto; }
  .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:14px; }
  .card { background:var(--panel); border:1px solid #262c38; border-radius:12px;
          overflow:hidden; cursor:pointer; }
  .card img { width:100%; display:block; image-rendering:pixelated; background:#0c0f14; }
  .card .meta { padding:10px 12px; }
  .card .t { font-weight:600; }
  .card .d { color:var(--dim); font-size:12px; margin-top:2px; }
  .tag { display:inline-block; font-size:11px; color:var(--accent);
         border:1px solid #2f3a44; border-radius:999px; padding:1px 8px; margin-top:6px; }
  .section { margin:22px 0 10px; font-size:13px; color:var(--dim);
             text-transform:uppercase; letter-spacing:.08em; }
  .assets { display:grid; grid-template-columns:repeat(auto-fill,minmax(90px,1fr)); gap:10px; }
  .asset { background:var(--panel); border:1px solid #262c38; border-radius:10px;
           padding:8px; text-align:center; font-size:11px; color:var(--dim); }
  .asset img { width:64px; height:64px; object-fit:contain; image-rendering:pixelated; }
  dialog { border:none; border-radius:14px; background:var(--panel); color:var(--ink);
           max-width:min(96vw,900px); padding:0; }
  dialog::backdrop { background:rgba(0,0,0,.7); }
  .modal-img { width:100%; image-rendering:pixelated; background:#0c0f14; display:block; }
  .modal-body { padding:14px 16px; }
  .modal-body h2 { margin:0 0 4px; font-size:17px; }
  .kv { color:var(--dim); font-size:13px; }
  .close { position:absolute; top:8px; right:12px; font-size:22px; color:#fff;
           background:rgba(0,0,0,.5); border:none; border-radius:50%; width:34px; height:34px;
           cursor:pointer; }
  a { color:var(--accent); }
</style>
</head>
<body>
<header>
  <h1>Pixel Maps</h1>
  <div class="sub" id="sub">loading…</div>
</header>
<div class="wrap">
  <div class="section">Zones (loading zones)</div>
  <div class="grid" id="zones"></div>
  <div class="section">Tilesets</div>
  <div class="assets" id="tilesets"></div>
  <div class="section">Objects</div>
  <div class="assets" id="objects"></div>
</div>

<dialog id="modal">
  <button class="close" onclick="document.getElementById('modal').close()">×</button>
  <img class="modal-img" id="mimg">
  <div class="modal-body" id="mbody"></div>
</dialog>

<script>
async function main(){
  let data;
  try { data = await (await fetch('viewer_data.json?_='+Date.now())).json(); }
  catch(e){ document.getElementById('sub').textContent='no viewer_data.json yet'; return; }
  document.getElementById('sub').textContent =
    `${data.zones.length} zone(s) · ${data.tilesets.length} tileset(s) · ${data.objects.length} object(s)`;

  const zc = document.getElementById('zones');
  for(const z of data.zones){
    const el = document.createElement('div'); el.className='card';
    el.innerHTML = `<img loading="lazy" src="${z.preview}" alt="${z.title}">
      <div class="meta"><div class="t">${z.title}</div>
      <div class="d">${z.grid?.width}×${z.grid?.height} tiles · ${z.objects} objects</div>
      <span class="tag">${z.kind}/${z.archetype||''}</span></div>`;
    el.onclick = ()=>openZone(z);
    zc.appendChild(el);
  }
  const tc = document.getElementById('tilesets');
  for(const t of data.tilesets){
    const el=document.createElement('div'); el.className='asset';
    el.innerHTML=`<img src="${t.atlas}/wang_15.png" onerror="this.style.opacity=.2"><div>${t.id}</div>`;
    tc.appendChild(el);
  }
  const oc=document.getElementById('objects');
  for(const o of data.objects){
    const el=document.createElement('div'); el.className='asset';
    el.innerHTML=`<img src="${o.preview}"><div>${o.id}</div>`;
    oc.appendChild(el);
  }
}
function openZone(z){
  document.getElementById('mimg').src = z.preview;
  const exits = (z.exits||[]).map(e=>`${e.kind} → ${e.to_zone||'(unlinked)'}`).join(', ')||'none';
  document.getElementById('mbody').innerHTML =
    `<h2>${z.title}</h2>
     <div class="kv">${z.description||''}</div>
     <div class="kv">grid ${z.grid?.width}×${z.grid?.height} · tile ${z.tile_size}px · ${z.kind}/${z.archetype||''}</div>
     <div class="kv">levels: ${(z.levels||[]).join(' → ')}</div>
     <div class="kv">tilesets: ${(z.bands||[]).join(', ')}</div>
     <div class="kv">exits: ${exits}</div>
     <div class="kv"><a href="${z.manifest}">zone.json ↗</a></div>`;
  document.getElementById('modal').showModal();
}
main();
</script>
</body>
</html>
