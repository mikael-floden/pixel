name: nangijala deploy

# Build the single Nangijala image (client + art + Colyseus WS) and deploy it to
# Cloud Run. Keyless auth via Workload Identity Federation — no stored secrets.
# One-time setup: games/nangijala/deploy/gcp-bootstrap.sh, then set the repo
# Variables it prints. See games/nangijala/deploy/DEPLOY.md.

on:
  push:
    branches: [main]
    # Game code changes auto-deploy. Art is baked into the image, so refresh it
    # with the scheduled run or a manual dispatch (avoids redeploying on every
    # art commit — the art loops push very frequently).
    paths:
      - "games/nangijala/**"
      - ".github/workflows/nangijala-deploy.yml"
  workflow_dispatch: {}       # manual: also picks up the latest baked-in art
  schedule:
    - cron: "0 5 * * *"       # daily 05:00 UTC — roll the newest art into prod

# Only the newest deploy matters; cancel superseded runs.
concurrency:
  group: nangijala-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write          # required for Workload Identity Federation
    steps:
      - uses: actions/checkout@v4   # full repo — the image bakes in sibling art

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOY_SA }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ vars.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build & push image
        env:
          IMAGE: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GCP_AR_REPO }}/${{ vars.GCP_SERVICE }}
        run: |
          docker build -f games/nangijala/Dockerfile -t "$IMAGE:${{ github.sha }}" -t "$IMAGE:latest" .
          docker push "$IMAGE:${{ github.sha }}"
          docker push "$IMAGE:latest"

      - name: Deploy to Cloud Run
        env:
          IMAGE: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GCP_AR_REPO }}/${{ vars.GCP_SERVICE }}
        run: |
          gcloud run deploy "${{ vars.GCP_SERVICE }}" \
            --image "$IMAGE:${{ github.sha }}" \
            --region "${{ vars.GCP_REGION }}" \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --cpu 1 --memory 512Mi \
            --min-instances 0 \
            --max-instances 1 \
            --no-cpu-throttling \
            --session-affinity \
            --timeout 3600

      - name: Show URL
        run: |
          gcloud run services describe "${{ vars.GCP_SERVICE }}" \
            --region "${{ vars.GCP_REGION }}" --format='value(status.url)'
