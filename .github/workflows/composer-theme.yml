name: Composer title theme

# The composer's OWN title/menu music (games2/composer/music/title.mp3) — same
# rights + ELEVENLABS_API_KEY as the music domain (maintainer 2026-07-19,
# "free hands"). On-demand only: run it after editing the brief in
# music/pipeline/generate.py. Commits the mp3; the pushed file deploys with the
# next client build (bundled by Vite via import.meta.glob).

on:
  workflow_dispatch:
    inputs:
      seconds:
        description: "Theme length in seconds (default 90)"
        default: "90"

permissions:
  contents: write
  actions: write # self-trigger the deploy after committing

concurrency:
  group: composer-theme
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Compose the title theme
        env:
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
        run: python games2/composer/music/pipeline/generate.py ${{ github.event.inputs.seconds }}

      - name: Commit + push
        id: push
        run: |
          git config user.name "pixel-composer-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add games2/composer/music/
          git diff --cached --quiet && { echo "nothing generated"; exit 0; }
          git commit -m "composer: regenerate title theme (own generation rights)"
          ok=0
          for i in 1 2 3 4; do
            if git push origin main; then ok=1; break; fi
            git pull --rebase origin main
          done
          [ "$ok" = 1 ] || git push origin main
          echo "pushed=1" >> "$GITHUB_OUTPUT"

      # Default GITHUB_TOKEN pushes don't fire the deploy workflow — dispatch it.
      - name: Trigger deploy
        if: steps.push.outputs.pushed == '1'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          curl -sf -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/nangijala-deploy.yml/dispatches" \
            -d '{"ref":"main"}'
          echo "deploy dispatched"
