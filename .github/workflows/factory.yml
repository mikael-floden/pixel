name: Pixel character factory loop

# Autonomous generation loop. Runs on a schedule (and on demand), advances the
# factory by a bounded chunk, and the loop itself commits + pushes each unit to
# main. Manage it entirely from a phone: add the PIXELLAB_API_KEY secret in
# GitHub repo settings, and trigger/disable from the Actions tab.

on:
  schedule:
    - cron: "0 */2 * * *"      # every 2 hours (UTC)
  workflow_dispatch:
    inputs:
      max_minutes:
        description: "Minutes to run this pass"
        default: "50"
      min_balance:
        description: "Stop when generations remaining drops below this"
        default: "40"

# Allow the job (and the loop's git push) to write to the repo.
permissions:
  contents: write

# Never let two passes run at once (scheduled + manual).
concurrency:
  group: factory-loop
  cancel-in-progress: false

jobs:
  loop:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run the factory loop
        env:
          PIXELLAB_API_KEY: ${{ secrets.PIXELLAB_API_KEY }}
        run: |
          if [ -z "$PIXELLAB_API_KEY" ]; then
            echo "::warning::PIXELLAB_API_KEY secret is not set."
            echo "Add it in repo Settings -> Secrets and variables -> Actions -> New repository secret. Skipping this run."
            exit 0
          fi
          git config user.name "pixel-factory-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          python pipeline/loop.py \
            --max-minutes "${{ github.event.inputs.max_minutes || '50' }}" \
            --min-balance "${{ github.event.inputs.min_balance || '40' }}"
