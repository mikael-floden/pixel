name: Pixel character factory loop

# Autonomous generation loop. Runs on a schedule (and on demand), advances the
# factory by a bounded chunk, and the loop itself commits + pushes each unit to
# main. Manage it entirely from a phone: add the PIXELLAB_API_KEY secret in
# GitHub repo settings, and trigger/disable from the Actions tab.

on:
  schedule:
    # Every 6h (UTC). Each pass runs ~5.5h (near GitHub's 6h job cap), so passes
    # are essentially continuous — this cron only needs to RESTART a finished
    # pass, not fill gaps. GitHub's scheduler is best-effort (delays/skips), but
    # with long passes an occasional missed tick barely matters, and a manual
    # "Run workflow" always resumes immediately.
    - cron: "7 */6 * * *"
  workflow_dispatch:
    inputs:
      max_minutes:
        description: "Minutes to run this pass"
        default: "330"
      min_balance:
        description: "Stop when generations remaining drops below this"
        default: "40"

# Allow the job (and the loop's git push) to write to the repo.
permissions:
  contents: write

# Never let two passes run at once (scheduled + manual).
concurrency:
  group: factory-loop
  cancel-in-progress: false

jobs:
  loop:
    runs-on: ubuntu-latest
    timeout-minutes: 350        # ~5.5h passes (under GitHub's 6h job cap)
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run the factory loop
        env:
          PIXELLAB_API_KEY: ${{ secrets.PIXELLAB_API_KEY }}
        run: |
          if [ -z "$PIXELLAB_API_KEY" ]; then
            echo "::warning::PIXELLAB_API_KEY secret is not set."
            echo "Add it in repo Settings -> Secrets and variables -> Actions -> New repository secret. Skipping this run."
            exit 0
          fi
          git config user.name "pixel-factory-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          python characters/pipeline/loop.py \
            --max-minutes "${{ github.event.inputs.max_minutes || '330' }}" \
            --min-balance "${{ github.event.inputs.min_balance || '40' }}"
