name: Composer foley generation

# The composer agent's OWN audio generation (games2/composer/foley/) — same
# rights + same ELEVENLABS_API_KEY secret as the sounds/music domains
# (maintainer 2026-07-18). On-demand only: run it after editing the briefs in
# generate.py, optionally limiting to specific surfaces. Commits the mastered
# takes + manifest; the pushed WAVs deploy with the next client build (they
# are bundled by Vite via import.meta.glob).

on:
  workflow_dispatch:
    inputs:
      surfaces:
        description: "Space-separated sets (empty = all: grass sand snow stone ice wood dirt swamp thunder water_step ui_tick ui_confirm ui_cancel)"
        default: ""

permissions:
  contents: write
  actions: write   # self-trigger the deploy after committing (see last step)

concurrency:
  group: composer-foley
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate + master the foley takes
        env:
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
        run: python games2/composer/foley/pipeline/generate.py ${{ github.event.inputs.surfaces }}

      - name: Commit + push
        id: push
        run: |
          git config user.name "pixel-composer-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add games2/composer/foley/
          git diff --cached --quiet && { echo "nothing generated"; exit 0; }
          git commit -m "composer: regenerate foley sets (own generation rights)"
          ok=0
          for i in 1 2 3 4; do
            if git push origin main; then ok=1; break; fi
            git pull --rebase origin main
          done
          [ "$ok" = 1 ] || git push origin main
          echo "pushed=1" >> "$GITHUB_OUTPUT"

      # A push made with the default GITHUB_TOKEN does NOT fire the deploy
      # workflow (GitHub's recursive-trigger guard) — the new WAVs would sit
      # on main unbaked. Dispatch the deploy explicitly instead.
      - name: Trigger deploy
        if: steps.push.outputs.pushed == '1'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          curl -sf -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/nangijala-deploy.yml/dispatches" \
            -d '{"ref":"main"}'
          echo "deploy dispatched"
