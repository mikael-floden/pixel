name: Pixel object factory loop

# Autonomous generation loop for the objects/ domain. Runs on a schedule (and on
# demand), advances the factory by a bounded chunk, and the loop itself commits +
# pushes each unit. Manage it from a phone: add the PIXELLAB_API_KEY secret in
# GitHub repo settings, and trigger/disable from the Actions tab.

on:
  # Scheduled loop is DISABLED (stopped on request). Re-enable by uncommenting the
  # cron below; the loop still runs on demand via the Actions "Run workflow" button.
  # schedule:
  #   - cron: "25 * * * *"
  workflow_dispatch:
    inputs:
      max_minutes:
        description: "Minutes to run this pass"
        default: "80"
      min_balance:
        description: "Stop when generations remaining drops below this"
        default: "2000"
      restyle:
        description: "Regenerate objects made under an older style_version (true/false)"
        default: "false"

# Allow the job (and the loop's git push) to write to the repo.
permissions:
  contents: write

# Never let two object passes run at once (scheduled + manual). This is a
# separate group from the character loop, so the two domains can run in parallel.
concurrency:
  group: objects-loop
  cancel-in-progress: false

jobs:
  loop:
    runs-on: ubuntu-latest
    # Generous headroom over the loop's --max-minutes clean exit: a single
    # 8-direction/16-frame animation unit can take ~8 min, so the last unit must
    # be able to finish and COMMIT well before the job is killed. (A 55-min cap
    # was cancelling passes mid-unit and losing that object.)
    timeout-minutes: 120
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          # depth 1: the pack is >1 GiB of binary-art history — the loop only
          # needs the tip to commit+push (rebase-on-reject fetches what it
          # needs). Full history cost ~minutes per run for nothing.
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run the objects loop
        env:
          PIXELLAB_API_KEY: ${{ secrets.PIXELLAB_API_KEY }}
        run: |
          if [ -z "$PIXELLAB_API_KEY" ]; then
            echo "::warning::PIXELLAB_API_KEY secret is not set."
            echo "Add it in repo Settings -> Secrets and variables -> Actions -> New repository secret. Skipping this run."
            exit 0
          fi
          git config user.name "pixel-objects-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          python objects/pipeline/loop.py \
            --max-minutes "${{ github.event.inputs.max_minutes || '80' }}" \
            --min-balance "${{ github.event.inputs.min_balance || '2000' }}" \
            ${{ github.event.inputs.restyle == 'true' && '--restyle' || '' }}
