name: Pixel tiles factory loop

# Autonomous isometric-tile generation loop. Runs on a schedule (and on demand),
# generates focused 64x64 / 28-degree / 50%-thickness isometric tile sets, and
# commits + pushes each to main. Add the PIXELLAB_API_KEY secret in repo settings.

on:
  # Scheduled loop PAUSED at the user's request. Re-enable by uncommenting the
  # cron below; the loop still runs on demand via the Actions "Run workflow" button.
  # schedule:
  #   - cron: "15 */3 * * *"     # every 3 hours (UTC), offset from the other loops
  workflow_dispatch:
    inputs:
      max_minutes:
        description: "Minutes to run this pass"
        default: "50"
      min_balance:
        description: "Stop when generations remaining drops below this"
        default: "500"

permissions:
  contents: write

concurrency:
  group: tiles-loop
  cancel-in-progress: false

jobs:
  loop:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run the tiles loop
        env:
          PIXELLAB_API_KEY: ${{ secrets.PIXELLAB_API_KEY }}
        run: |
          if [ -z "$PIXELLAB_API_KEY" ]; then
            echo "::warning::PIXELLAB_API_KEY secret is not set. Skipping."
            exit 0
          fi
          git config user.name "pixel-tiles-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          python tiles/pipeline/loop.py \
            --max-minutes "${{ github.event.inputs.max_minutes || '50' }}" \
            --min-balance "${{ github.event.inputs.min_balance || '500' }}"
